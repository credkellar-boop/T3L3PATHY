name: T3L3PATHY Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest flake8 black

    - name: Enforce Package Architecture Compliance
      run: |
        echo "Verifying structural integrity and checking for missing __init__.py files..."
        MISSING_INIT=0
        for dir in apps/display_server apps/orchestrator core/pipeline core/polygraph core/s3if_c0n8ious drivers/biometric/fingerprint drivers/kinetic/motion_imu drivers/neural/eeg_brainflow drivers/neural/emg_somatic drivers/optical/face_mesh drivers/physiological/ecg_cardio shared; do
          if [ -d "$dir" ] && [ ! -f "$dir/__init__.py" ]; then
            echo "::error file=$dir::Missing critical __init__.py file in package directory: $dir"
            MISSING_INIT=1
          fi
        done
        if [ $MISSING_INIT -ne 0 ]; then
          echo "Architecture check failed. Missing package boundaries detected."
          exit 1
        fi

    - name: Code Linting & Style Check
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Format verification
        black --check . --exclude 'venv|\.git|__pycache__'

    - name: Execute Multi-Modal Test Pipeline
      run: |
        # Exporting repository root to PYTHONPATH so cross-module imports resolve correctly
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        if [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then
          pip install -e .
        fi
        pytest
        
